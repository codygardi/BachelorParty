<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Shared RSVP page for Robbie Merchant's January 2027 bachelor party in Grass Valley, California."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="bachelor-party.css?v=20260719d">
    <title>Robbie's Bachelor Party RSVP</title>
  </head>
  <body>
    <main class="page-shell">
      <div class="rsvp-page" data-rsvp-page>
        <section class="quest-notice" aria-labelledby="page-title">
          <img
            src="assets/quest-banner.png"
            class="quest-banner"
            alt="Parchment quest banner with a d20 and mountain trail"
          >
          <p class="eyebrow">Quest notice</p>
          <h1 id="page-title">Robbie's Bachelor Party RSVP</h1>
          <p class="hero-lead">
            Pick your name below, mark the weekends you have available, and leave any travel notes for the quest log.
          </p>
        </section>

        <section class="rsvp-panel collapsible-panel" aria-labelledby="rsvp-title" data-collapsible data-roll-call>
          <div class="panel-heading panel-heading-compact panel-heading-with-action">
            <button
              type="button"
              class="section-toggle"
              data-collapse-toggle
              aria-expanded="true"
              aria-controls="roll-call-content"
            >
              <span class="eyebrow" id="rsvp-title">Roll call</span>
              <span class="collapse-indicator" aria-hidden="true"></span>
            </button>
            <button
              type="button"
              class="heading-action"
              data-already-did-this
            >
              Already Did This
            </button>
          </div>

          <div id="roll-call-content" data-collapsible-content>
            <p class="status-message" data-status-message role="status" aria-live="polite" hidden></p>

            <form class="rsvp-form" data-rsvp-form novalidate>
              <div class="field-group">
                <label for="invitee-select">Name</label>
                <select id="invitee-select" name="invitee" data-invitee-select required>
                  <option value="">Choose your name</option>
                </select>
              </div>

              <div class="phone-card" data-phone-card hidden>
                <span>Saved phone</span>
                <strong data-phone-display></strong>
              </div>

              <fieldset class="choice-group">
                <legend>RSVP status</legend>
                <div class="stacked-options" data-status-options></div>
              </fieldset>

              <fieldset class="choice-group">
                <legend>Weekend availability</legend>
                <div class="stacked-options" data-availability-options></div>
              </fieldset>

              <div class="field-group">
                <label for="notes">Notes</label>
                <textarea
                  id="notes"
                  name="notes"
                  rows="5"
                  data-notes
                  placeholder="Travel constraints, timing notes, dietary restrictions, or party-planning details"
                ></textarea>
              </div>

              <button type="submit" class="primary-action" data-submit-rsvp>Submit RSVP</button>
            </form>
          </div>
        </section>
      </div>

      <section class="details-page" data-details-page hidden aria-label="Quest details dashboard">
        <button type="button" class="back-button" data-back-to-rsvp aria-label="Back to RSVP form">Back</button>

        <div class="details-card collapsible-panel" data-collapsible>
          <div class="panel-heading panel-heading-compact">
            <button
              type="button"
              class="section-toggle"
              data-collapse-toggle
              aria-expanded="true"
              aria-controls="party-log-content"
            >
              <span class="eyebrow">Party log</span>
              <span class="collapse-indicator" aria-hidden="true"></span>
            </button>
          </div>
          <div id="party-log-content" data-collapsible-content>
            <div class="response-list" data-response-list></div>
          </div>
        </div>

        <div class="details-card collapsible-panel" data-collapsible>
          <div class="panel-heading panel-heading-compact">
            <button
              type="button"
              class="section-toggle"
              data-collapse-toggle
              aria-expanded="true"
              aria-controls="availability-content"
            >
              <span class="eyebrow">Availability</span>
              <span class="collapse-indicator" aria-hidden="true"></span>
            </button>
          </div>
          <div id="availability-content" data-collapsible-content>
            <div class="overlap-summary" data-overlap-summary></div>
            <div class="overlap-list" data-overlap-list></div>
          </div>
        </div>

        <div class="details-card collapsible-panel" data-collapsible>
          <div class="panel-heading panel-heading-compact">
            <button
              type="button"
              class="section-toggle"
              data-collapse-toggle
              aria-expanded="true"
              aria-controls="quest-details-content"
            >
              <span class="eyebrow">Quest details</span>
              <span class="collapse-indicator" aria-hidden="true"></span>
            </button>
          </div>
          <div id="quest-details-content" data-collapsible-content>
            <div class="trip-list" data-trip-details></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Celebrating Robbie Merchant in Grass Valley, CA.</p>
      <form class="footer-reset-form" data-reset-form aria-label="Grant access to hidden quest details">
        <label for="reset-password">Planner access password</label>
        <input
          id="reset-password"
          type="password"
          name="reset-password"
          autocomplete="off"
          data-reset-password
          placeholder="Password"
        >
        <button type="submit">Grant Access</button>
        <span class="footer-reset-message" data-reset-message role="status" aria-live="polite"></span>
      </form>
    </footer>

    <script src="bachelor-party-config.js?v=20260719d"></script>
    <script src="bachelor-party.js?v=20260719d"></script>
  </body>
</html>
